<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#f3f6fc" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Nord Challenges" />
<link rel="apple-touch-icon" href="icon-512.png" />
<link rel="icon" type="image/png" href="icon-512.png" />
<link rel="manifest" href="manifest.json" />
<!-- No service worker / offline cache, so the app always loads the latest
     version from the network (even after "Add to Home Screen"). These hints
     discourage stale caching of the page itself. -->
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
<title>Nord Challenges</title>
<style>
  :root{
    --bg:#f3f6fc;
    --bg2:#eef2fa;
    --card:#ffffff;
    --ink:#21304c;
    --muted:#7b87a0;
    --line:#e7ecf6;
    --blue:#3a64d8;
    --blue-soft:#eaf0ff;
    --red:#e0556a;
    --red-soft:#fdeef0;
    --amber:#e8a13c;
    --amber-soft:#fff6e6;
    --green:#36b07a;
    --green-soft:#e8f7ef;
    --shadow:0 6px 20px rgba(33,48,76,.07);
    --shadow-sm:0 2px 8px rgba(33,48,76,.06);
    --r:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .app{max-width:560px;margin:0 auto;padding:0 16px 100px;position:relative}

  /* ---------- generic ---------- */
  button{font-family:inherit;cursor:pointer;border:none;color:inherit}
  .btn{
    background:var(--blue);color:#fff;border-radius:14px;padding:14px 18px;font-size:16px;font-weight:700;
    box-shadow:var(--shadow-sm);width:100%;letter-spacing:.2px;transition:transform .08s ease,filter .15s ease;
  }
  .btn:active{transform:scale(.97)}
  .btn:disabled{opacity:.45}
  .btn.green{background:var(--green)}
  .btn.ghost{background:var(--bg2);color:var(--ink);box-shadow:none}
  .btn.outline{background:#fff;color:var(--blue);box-shadow:none;border:1.5px solid var(--line)}
  .btn.small{padding:9px 13px;font-size:13px;width:auto;border-radius:11px}
  .card{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);border:1px solid var(--line);margin-bottom:12px}
  .card:last-child{margin-bottom:0}
  .muted{color:var(--muted)}
  .center{text-align:center}
  .ig{margin-right:.32em}
  .row{display:flex;align-items:center;gap:10px}
  .sv{color:#8a6a2f;font-size:12.5px;line-height:1.45;margin-top:6px;position:relative;padding-left:28px}
  .sv::before{content:"SV";position:absolute;left:0;top:0;font-size:9px;font-weight:800;letter-spacing:.5px;
    color:#a9803a;background:var(--amber-soft);border:1px solid #efdfbd;border-radius:5px;padding:1px 5px}
  .hide{display:none !important}
  .pill{display:inline-flex;align-items:center;gap:6px;background:var(--amber-soft);color:#9a6b12;
    border-radius:999px;padding:6px 12px;font-size:14px;font-weight:700}

  .screen{animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* ---------- brand / setup ---------- */
  .brand{text-align:center;padding:34px 0 8px}
  .brand .plane{font-size:44px;display:block;animation:fly 4s ease-in-out infinite}
  @keyframes fly{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-9px) rotate(4deg)}}
  .brand h1{margin:8px 0 2px;font-size:25px;letter-spacing:.2px}
  .stripe{height:5px;border-radius:5px;margin:12px auto 0;max-width:160px;
    background:linear-gradient(90deg,var(--blue) 0 33%,#cfd9f0 33% 66%,var(--red) 66% 100%);opacity:.85}

  .pickgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
  .pickcard{cursor:pointer;text-align:center;padding:22px 12px;transition:transform .08s}
  .pickcard:active{transform:scale(.97)}
  .pickcard .av{font-size:50px}
  .pickcard .nm{font-weight:800;font-size:19px;margin-top:6px}
  .pickcard.sel{border-color:var(--blue);box-shadow:0 0 0 2px var(--blue) inset, var(--shadow)}

  .avatars{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:14px}
  .avo{aspect-ratio:1;display:grid;place-items:center;font-size:30px;background:var(--bg2);border-radius:14px;cursor:pointer;border:2px solid transparent}
  .avo:active{transform:scale(.94)}
  .avo.sel{border-color:var(--blue);background:var(--blue-soft)}

  /* ---------- header ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 2px 8px;position:sticky;top:0;z-index:30;
    background:linear-gradient(180deg,var(--bg) 72%,rgba(243,246,252,0))}
  .topbar .who{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px}
  .topbar .av{font-size:26px}
  .ssync{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--blue);
    background:var(--blue-soft);padding:8px 12px;border-radius:11px}

  /* stats */
  .statgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:6px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 8px;text-align:center;box-shadow:var(--shadow-sm)}
  .stat .v{font-size:21px;font-weight:800;line-height:1}
  .stat .l{font-size:11px;color:var(--muted);margin-top:5px;text-transform:uppercase;letter-spacing:.5px}

  .rankrow{display:flex;justify-content:space-between;align-items:baseline}
  .rankname{font-weight:800;font-size:18px}
  .xpbar{height:12px;background:var(--bg2);border-radius:999px;margin-top:10px;overflow:hidden}
  .xpfill{height:100%;background:linear-gradient(90deg,var(--amber),#f6c061);border-radius:999px;width:0;transition:width .7s cubic-bezier(.2,.8,.2,1)}

  /* team */
  .team{display:flex;gap:10px;margin-top:14px;align-items:stretch}
  .mate{flex:1;background:var(--bg2);border-radius:14px;padding:14px 10px;text-align:center;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-height:96px}
  .mate .av{font-size:30px}
  .mate .nm{font-weight:800}
  .mate .st{font-size:13px;color:var(--muted)}
  .mate.empty{color:var(--muted);font-size:13px}

  .countdown{display:flex;text-align:center;margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
  .countdown>div{flex:1}
  .countdown .v{font-size:24px;font-weight:800;color:var(--blue);height:30px;display:flex;align-items:center;justify-content:center}
  .countdown .v.sm{font-size:14px}
  .countdown .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}

  h2.sec{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:24px 4px 10px;font-weight:800}

  /* journey */
  .journey{position:relative;padding-left:30px}
  .journey::before{content:"";position:absolute;left:13px;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--line)}
  .stop{position:relative;margin-bottom:15px}
  .stop .dot{position:absolute;left:-30px;top:-2px;width:30px;height:30px;border-radius:50%;
    background:#fff;border:2px solid var(--line);display:grid;place-items:center;font-size:15px}
  .stop.done .dot{background:var(--green-soft);border-color:var(--green)}
  .stop.current .dot{background:var(--amber-soft);border-color:var(--amber);box-shadow:0 0 0 5px rgba(232,161,60,.16)}
  .stop .t{font-weight:700}
  .stop .s{font-size:12px;color:#9a6b12}
  .stop .need{font-size:11px;color:var(--muted)}
  .stop:not(.done) .t{color:var(--muted)}
  .readmore{display:inline-block;margin-top:5px;font-size:12px;font-weight:700;color:var(--blue);text-decoration:none}
  /* unlock password boxes */
  .pwwrap{position:relative;margin:16px auto 0;width:fit-content;max-width:100%}
  .pwboxes{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  .pwbox{width:44px;height:58px;border-radius:12px;border:2px solid var(--line);background:#fff;
    display:grid;place-items:center;font-size:28px;font-weight:800;text-transform:uppercase;color:var(--blue)}
  .pwbox.filled{border-color:var(--blue);background:var(--blue-soft)}
  .pwinput{position:absolute;inset:0;width:100%;height:100%;opacity:0;border:0;font-size:16px;letter-spacing:2.4em}
  .pwwrap.bad .pwbox{border-color:var(--red);background:var(--red-soft);animation:shake .42s}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

  /* chips */
  .chips{display:flex;gap:8px;overflow-x:auto;padding:4px 0 8px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:none;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:9px 14px;font-size:13px;font-weight:700;white-space:nowrap;color:var(--ink)}
  .chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}

  /* challenge */
  .ch{margin-bottom:12px;position:relative}
  .ch .top{display:flex;gap:11px;align-items:flex-start}
  .ch .ico{font-size:25px;flex:none}
  .ch .en{font-weight:700;font-size:16px;line-height:1.3}
  .ch .pts{flex:none;background:var(--amber-soft);color:#9a6b12;border-radius:10px;padding:4px 9px;font-weight:800;font-size:13px}
  .ch .meta{display:flex;gap:6px;align-items:center;margin-top:7px;flex-wrap:wrap}
  .tag{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);background:var(--bg2);padding:3px 8px;border-radius:6px}
  .ch .svbox{margin-top:11px;background:var(--amber-soft);border-radius:10px;padding:9px 11px;display:none}
  .ch .svbox.show{display:block}
  .ch .actions{display:flex;gap:8px;margin-top:12px}
  .ch.done{opacity:.6}
  .ch.done .done-badge{position:absolute;top:12px;right:12px;background:var(--green-soft);color:#1d7a51;font-weight:800;font-size:12px;padding:4px 9px;border-radius:8px}

  /* badges */
  .badgegrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .badge{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 8px;text-align:center;box-shadow:var(--shadow-sm)}
  .badge .b{font-size:32px;filter:grayscale(1);opacity:.35}
  .badge.unlocked .b{filter:none;opacity:1}
  .badge .nm{font-size:11px;font-weight:800;margin-top:6px}
  .badge .ds{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.3}
  .badge.unlocked{border-color:var(--amber)}

  /* sync */
  .codebox{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;background:var(--bg2);border:1px dashed var(--line);
    border-radius:12px;padding:12px;word-break:break-all;margin-top:8px;color:var(--ink)}
  .scanbox{position:relative;width:100%;aspect-ratio:1;background:#000;border-radius:14px;overflow:hidden}
  .scanbox video{width:100%;height:100%;object-fit:cover;display:block}
  .scanframe{position:absolute;inset:16%;border:3px solid rgba(255,255,255,.9);border-radius:14px;pointer-events:none}

  /* nav */
  .nav{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(255,255,255,.9);
    backdrop-filter:blur(10px);border-top:1px solid var(--line)}
  .nav .inner{max-width:560px;margin:0 auto;display:flex;justify-content:space-around;padding:7px 4px 12px}
  .nav button{background:none;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10.5px;font-weight:700;padding:6px 8px;border-radius:12px}
  .nav button .ic{font-size:21px}
  .nav button.active{color:var(--blue)}

  /* toast + confetti + modal */
  .toast{position:fixed;left:50%;top:16%;transform:translateX(-50%) scale(.8);z-index:80;
    background:var(--green);color:#fff;font-weight:800;padding:14px 22px;border-radius:16px;box-shadow:var(--shadow);
    opacity:0;pointer-events:none;transition:all .3s cubic-bezier(.2,1.4,.4,1);text-align:center;max-width:90%}
  .toast.show{opacity:1;transform:translateX(-50%) scale(1)}
  .confetti{position:fixed;inset:0;pointer-events:none;z-index:70;overflow:hidden}
  .conf{position:absolute;width:9px;height:13px;will-change:transform;border-radius:2px}

  .overlay{position:fixed;inset:0;background:rgba(33,48,76,.4);z-index:90;display:none;align-items:center;justify-content:center;padding:18px}
  .overlay.show{display:flex}
  .modal{width:100%;max-width:420px;max-height:88vh;overflow:auto;animation:pop .25s ease}
  @keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
  input,select{width:100%;padding:13px;border-radius:12px;border:1px solid var(--line);background:#fff;color:var(--ink);font-size:16px;margin-top:6px}
  label{font-size:13px;font-weight:700;color:var(--muted);display:block;margin-top:14px}
  .danger{color:var(--red)}
  .hr{border:none;border-top:1px solid var(--line);margin:18px 0}
  .fact{background:var(--bg2);border-left:3px solid var(--amber);border-radius:8px;padding:10px 12px;margin-top:10px;font-size:14px}
  .fact .sv{margin-top:5px}
</style>
</head>
<body>
<div class="app" id="app"></div>

<nav class="nav hide" id="nav">
  <div class="inner">
    <button data-tab="home" class="active"><span class="ic">🏠</span>Home</button>
    <button data-tab="challenges"><span class="ic">🎯</span>Quests</button>
    <button data-tab="badges"><span class="ic">🏅</span>Badges</button>
    <button data-tab="sync"><span class="ic">🔗</span>Sync</button>
    <button data-tab="parent"><span class="ic">🔒</span>Parents</button>
  </div>
</nav>

<div class="toast" id="toast"></div>
<div class="confetti" id="confetti"></div>
<div class="overlay" id="overlay"><div class="modal card" id="modalBody"></div></div>

<script>
/* =========================================================================
   ROAD TO LONDON — Summer Challenge Game
   One player per phone. Progress saved locally. Combine the two kids'
   points with a sync code so the journey to London adds up together.
   English game with Swedish hints. Parent password gates resets.
   ========================================================================= */

const STORE_KEY = "roadToLondon_v2";
const APP_VERSION = "2026.06.14";   // bumped on each release; shown in Parents' Zone
const DEFAULT_PASSWORD = "london2026"; // parents' password (settings/resets)
const APP_PASSWORD = "london";         // simple password to unlock the app
const TRIP_START = "2026-10-25";   // London trip
const TRIP_END   = "2026-10-28";

const AVATARS = ["🦁","🦊","🐯","🐲","🦄","🐼","🐸","🐵","🦖","🐱","🐶","🦉","🐧","🦅","🦈","🐙","🚀","⚡","🔥","🌟","🦸","🥷","🧙","👑"];

const CATS = {
  house:    { name:"Summerhouse",        icon:"🏡" },
  reading:  { name:"Reading & Learning", icon:"📚" },
  active:   { name:"Active & Outdoors",  icon:"🏃" },
  dog:      { name:"Elton the Dog",      icon:"🐶" },
  kitchen:  { name:"Cooking & Baking",   icon:"🍳" },
  home:     { name:"Helping at Home",    icon:"🏠" },
  local:    { name:"Gothenburg",         icon:"🚋" },
  creative: { name:"Creative",           icon:"🎨" },
  kind:     { name:"Kindness",           icon:"💛" },
  english:  { name:"English & London",   icon:"🇬🇧" }
};

/* type: daily (once/day) · weekly (once/week) · once (one-time big quest)
   POINT DESIGN — tuned for two kids over ~19 weeks (15 Jun → 25 Oct) feeding a
   combined journey that tops out at 9000 (Level 16):
     • Easy daily quests: 10  — small but always worth doing.
     • Standard daily: 15 · effort daily: 20.
     • Weekly quests: 25–45 — clearly beat dailies, reward bigger effort.
     • Outings (paid/with a parent): 40–55.
     • One-time BIG quests: 90–150 — the hardest, most valuable goals.
   Daily quests are also capped at 10 completions each (see maxCount), so the top
   levels can't be farmed quickly — reaching 9000 needs steady effort, mixing in
   weekly and big quests, and lands near the trip rather than mid-summer. */
const CHALLENGES = [
  /* SUMMERHOUSE 🏡 — shared with cousins & family (17 people): fun together + helping out. */
  {id:"sh1",  cat:"house", type:"weekly", stars:30, icon:"🏃", en:"Play a big group game with your cousins (tag, kubb, hide & seek)", sv:"Lek en stor grupplek med kusinerna (kull, kubb, kurragömma)."},
  {id:"sh2",  cat:"house", type:"once",   stars:35, icon:"🏅", en:"Organise a mini-Olympics or competition for everyone", sv:"Ordna ett mini-OS eller en tävling för alla."},
  {id:"sh3",  cat:"house", type:"weekly", stars:25, icon:"🏕️", en:"Build a den or fort with your cousins", sv:"Bygg en koja eller fästning med kusinerna."},
  {id:"sh4",  cat:"house", type:"once",   stars:35, icon:"🎭", en:"Put on a show or talent night for the family", sv:"Sätt upp en show eller talangkväll för familjen."},
  {id:"sh5",  cat:"house", type:"weekly", stars:25, icon:"🎲", en:"Have a board-game or movie night with your cousins", sv:"Ha en spelkväll eller filmkväll med kusinerna."},
  {id:"sh6",  cat:"house", type:"once",   stars:30, icon:"🗺️", en:"Make a treasure hunt for the younger cousins", sv:"Gör en skattjakt för de yngre kusinerna."},
  {id:"sh7",  cat:"house", type:"once",   stars:25, icon:"📸", en:"Take a group photo of the whole family (all 17!)", sv:"Ta ett gruppfoto på hela familjen (alla 17!)."},
  {id:"sh8",  cat:"house", type:"daily",  stars:15, icon:"🍽️", en:"Help set the big table for everyone", sv:"Hjälp till att duka det stora bordet för alla."},
  {id:"sh9",  cat:"house", type:"daily",  stars:15, icon:"🧽", en:"Help clear and wash up after a big meal", sv:"Hjälp till att plocka undan och diska efter en stor måltid."},
  {id:"sh10", cat:"house", type:"weekly", stars:25, icon:"🍳", en:"Help cook or bake something for the whole family", sv:"Hjälp till att laga eller baka något till hela familjen."},
  {id:"sh11", cat:"house", type:"daily",  stars:10, icon:"🧹", en:"Tidy a shared room or common area", sv:"Städa ett gemensamt rum eller utrymme."},
  {id:"sh12", cat:"house", type:"daily",  stars:15, icon:"🤝", en:"Help a younger cousin with something", sv:"Hjälp en yngre kusin med något."},
  {id:"sh13", cat:"house", type:"weekly", stars:20, icon:"🛒", en:"Help carry groceries or take out the rubbish & recycling", sv:"Hjälp till att bära matkassar eller slänga sopor och återvinning."},
  {id:"sh14", cat:"house", type:"daily",  stars:15, icon:"🥤", en:"Mix FUN Light and serve a drink to everyone", sv:"Blanda FUN Light (saft) och servera alla något att dricka."},

  {id:"r1", cat:"reading", type:"daily",  stars:15, icon:"📖", en:"Read in English for 15 minutes", sv:"Läs på engelska i 15 minuter. Bok, serietidning eller app går bra."},
  {id:"r2", cat:"reading", type:"daily",  stars:15, icon:"📕", en:"Read a book in Swedish for 20 minutes", sv:"Läs en bok på svenska i 20 minuter."},
  {id:"r3", cat:"reading", type:"daily",  stars:10, icon:"✍️", en:"Learn 5 new English words and write them down", sv:"Lär dig 5 nya engelska ord och skriv ner dem med översättning."},
  {id:"r5", cat:"reading", type:"daily",  stars:10, icon:"🧮", en:"Practise maths for 10 minutes", sv:"Träna matte i 10 minuter, t.ex. gångertabellen eller huvudräkning."},
  {id:"r6", cat:"reading", type:"daily", max:10, stars:30, icon:"📝", en:"Write a short review of a book you read", sv:"Skriv en kort recension av en bok du läst."},

  {id:"a1", cat:"active", type:"daily",  stars:25, icon:"🚴", en:"Play outside or ride your bike for 30 minutes", sv:"Lek ute eller cykla i 30 minuter."},
  {id:"a2", cat:"active", type:"daily",  stars:10, icon:"🤸", en:"Do 20 jumping jacks and 10 push-ups", sv:"Gör 20 sprattelgubbar (jumping jacks) och 10 armhävningar."},
  {id:"a4", cat:"active", type:"weekly", stars:45, icon:"🥾", en:"Go for a walk or hike in the forest", sv:"Gå en promenad eller vandra i skogen."},
  {id:"a5", cat:"active", type:"daily",  stars:15, icon:"⚽", en:"Play a sport or ball game", sv:"Spela en sport eller ett bollspel."},
  {id:"a6", cat:"active", type:"daily",  stars:15, icon:"🛹", en:"Practise a skill: skateboard, jump rope, football tricks", sv:"Träna en färdighet: skateboard, hopprep eller fotbollstrick."},
  {id:"a7", cat:"active", type:"weekly", stars:35, icon:"🧗", en:"Go to a playground or outdoor gym", sv:"Gå till en lekplats eller ett utegym."},
  {id:"a8", cat:"active", type:"weekly", stars:40, icon:"🫐", en:"Pick blueberries or other berries in the forest", sv:"Plocka blåbär eller andra bär i skogen."},
  {id:"a9",  cat:"active", type:"daily", stars:10, icon:"🏸", en:"Play badminton", sv:"Spela badminton."},
  {id:"a10", cat:"active", type:"daily", stars:10, icon:"🤸", en:"Do some gymnastics", sv:"Träna gymnastik."},
  {id:"a11", cat:"active", type:"daily", stars:10, icon:"🦘", en:"Jump on the trampoline for 15 minutes", sv:"Hoppa studsmatta i 15 minuter."},

/* ---------------------------------------------------------------------------
   CONTENT vs PROGRESS
   All game CONTENT (categories, challenges, journey/levels, badges, facts) lives
   in the consts above and is re-read from the latest code on every page load —
   so it updates after a new release, even once the app is added to the home
   screen (there is no service worker caching an old copy).

   The player's PROGRESS lives in localStorage (state.me) and persists across
   those content updates. What is permanent and never recomputed:
     • state.me.stars      → total points (running total)
     • state.me.done       → completed challenges (keyed by stable challenge id)
     • state.me.evidence   → proof photos for completed challenges
   Multi-completion progress is derived from state.me.done by counting a
   challenge's id, so adding/editing challenges keeps the right counts as long
   as challenge ids are STABLE (never reuse an id for a different challenge).
   load() merges saved progress onto fresh defaults so new fields added in a
   future release don't wipe existing players.
--------------------------------------------------------------------------- */
function load(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    if(!raw) return defaultState();
    const saved=JSON.parse(raw);
    const s=Object.assign(defaultState(), saved);   // new fields fall back to defaults
    if(s.me){
      // ensure every expected field exists without touching real progress
      const shape={ stars:0, totalDone:0, catCount:{}, done:{}, streak:0, bestStreak:0, lastActive:null, badges:[], evidence:[] };
      s.me=Object.assign(shape, s.me);
      if(!s.me.id) s.me.id=newId();
    }
    return s;
  }catch(e){ return defaultState(); }
}
function save(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
  catch(e){
    // Storage full: drop oldest evidence metadata and retry. With photos now in
    // IndexedDB this should be very rare (localStorage only holds small metadata).
    if(state.me && state.me.evidence && state.me.evidence.length){
      while(state.me.evidence.length){
        const old=state.me.evidence.pop();
        if(old && old.key) photoDel(old.key);
        try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); return; }catch(_){}
      }
    }
  }
}

/* =========================================================================
   PHOTO STORAGE (IndexedDB)
   Why not localStorage for photos:
     • localStorage is small (~5 MB per ORIGIN — shared with everything else on
       this github.io origin) and synchronous.
     • We rewrite the whole state on every save, so base64 photos there get slow
       and hit the quota fast (~60 photos ≈ several MB).
   So proof photos live in IndexedDB (much larger, stored per-item, async) and
   localStorage keeps only lightweight metadata + the IndexedDB key.
   Falls back to inline base64 (old behaviour) if IndexedDB is unavailable.
   Note: on iOS, script storage can be evicted after ~7 days of not opening the
   site unless it's added to the Home Screen — hence requestPersist() + backups.
   ========================================================================= */
const HAS_IDB = (typeof indexedDB !== "undefined" && !!indexedDB);
const IDB_NAME="roadToLondon", IDB_STORE="photos";
let _dbp=null;
function idb(){
  if(_dbp) return _dbp;
  _dbp=new Promise((res,rej)=>{
    const r=indexedDB.open(IDB_NAME,1);
    r.onupgradeneeded=()=>r.result.createObjectStore(IDB_STORE);
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error);
  });
  return _dbp;
}
function idbReq(mode, fn){
  return idb().then(d=>new Promise((res,rej)=>{
    const t=d.transaction(IDB_STORE,mode), rq=fn(t.objectStore(IDB_STORE));
    t.oncomplete=()=>res(rq && rq.result);
    t.onerror=()=>rej(t.error); t.onabort=()=>rej(t.error);
  }));
}
const photoPut=(k,v)=>idbReq("readwrite",st=>st.put(v,k));
const photoGet=k=>idbReq("readonly",st=>st.get(k));
const photoDel=k=>idbReq("readwrite",st=>st.delete(k));
const photoClear=()=>idbReq("readwrite",st=>st.clear());
function photoKey(ts){ return "ev_"+ts+"_"+Math.random().toString(36).slice(2,7); }
/* Resolve an evidence entry to its image data URL (Promise<string|null>). */
function evImg(e){ return e.img ? Promise.resolve(e.img) : (e.key && HAS_IDB ? photoGet(e.key).catch(()=>null) : Promise.resolve(null)); }
/* Set <img src> for any rendered evidence thumbnails that load from IndexedDB. */
function hydrateImgs(root){
  (root||document).querySelectorAll("img[data-k]").forEach(img=>{
    photoGet(img.getAttribute("data-k")).then(d=>{ if(d) img.src=d; }).catch(()=>{});
  });
}
/* Ask the browser to keep our storage (helps resist eviction). Best effort. */
function requestPersist(){ try{ if(navigator.storage && navigator.storage.persist) navigator.storage.persist(); }catch(e){} }
/* Move any old inline photos into IndexedDB to free up localStorage. */
function migratePhotos(){
  if(!HAS_IDB || !state.me || !state.me.evidence) return;
  const tasks=state.me.evidence.filter(e=>e.img && !e.key).map(e=>{
    const k=photoKey(e.ts||Date.now());
    return photoPut(k, e.img).then(()=>{ e.key=k; delete e.img; }).catch(()=>{});
  });
  if(tasks.length) Promise.all(tasks).then(()=>save());
}

/* =========================================================================

function periodKey(ch){
  if(ch.type==="daily")  return ch.id+"|"+todayStr();
  if(ch.type==="weekly") return ch.id+"|"+weekStr();
  return ch.id+"|once";
}
function isDone(ch){ return !!state.me.done[periodKey(ch)]; }
/* How many times this quest may be completed in total (daily quests are
   capped: once per day, up to this many times over the summer). */
function maxCount(ch){ return ch.max!==undefined ? ch.max : (ch.type==="daily" ? 10 : null); }
/* Total times completed so far (counts each distinct day/week stamp). */
function timesDone(ch){ const pre=ch.id+"|"; return Object.keys(state.me.done).filter(k=>k.indexOf(pre)===0).length; }
function isMaxed(ch){ const m=maxCount(ch); return m!=null && timesDone(ch)>=m; }
/* Quests with a from/to date window are locked outside it (e.g. a seasonal event). */
function isDateLocked(ch){ const t=todayStr(); if(ch.from && t<ch.from) return true; if(ch.to && t>ch.to) return true; return false; }
function fmtDay(iso){ if(!iso) return ""; const d=new Date(iso+"T00:00:00"); return d.getDate()+" "+MONTHS[d.getMonth()]; }
function levelOf(stars){ return Math.floor(stars/STARS_PER_LEVEL)+1; }
function rankOf(stars){ return RANKS[Math.min(levelOf(stars)-1, RANKS.length-1)]; }
function combinedStars(){ return state.me.stars + (state.partner ? state.partner.st : 0); }
function journeyIndex(stars){ let i=0; JOURNEY.forEach((s,k)=>{ if(stars>=s.at) i=k; }); return i; }
function daysToTrip(){ const t=new Date(state.tripStart+"T00:00:00"); const n=new Date(); n.setHours(0,0,0,0); return Math.max(0,Math.round((t-n)/86400000)); }
function esc(s){ return (s+"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
/* Slim Swedish hint: one helper, consistent compact styling everywhere. */
function sv(t){ return `<div class="sv">${esc(t)}</div>`; }
/* Emoji with a little breathing room before the text that follows it. */
function ico(e){ return `<span class="ig">${e}</span>`; }
function scrollTop(){ try{ window.scrollTo(0,0); }catch(e){} }
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function tripRange(){
  const a=new Date(state.tripStart+"T00:00:00"), b=new Date(state.tripEnd+"T00:00:00");
  return a.getDate()+"–"+b.getDate()+" "+MONTHS[b.getMonth()]+" "+b.getFullYear();
}
function agoText(ts){
  const m=Math.round((Date.now()-ts)/60000);
  if(m<1) return "just now"; if(m<60) return m+" min ago";
  const h=Math.round(m/60); if(h<24) return h+" h ago";
  return Math.round(h/24)+" d ago";
}

/* One-time app unlock (password "london" by default). Once unlocked it stays
   unlocked on this device — the kids do an intro challenge to get the password. */
function renderLock(){
  document.getElementById("nav").classList.add("hide");
  const app=document.getElementById("app");
  const pw=(state.appPassword||"").toString();
  const n=Math.max(1, pw.length);
  app.innerHTML=`
   <div class="screen">
    <div class="brand">
      <span class="plane">✈️</span>
      <h1>Nord Challenges</h1>
      <div class="stripe"></div>
    </div>
    <div class="card center">
      <div style="font-weight:800;margin-bottom:4px">Hi ${esc(state.me.name)} ${state.me.avatar}</div>
      <div class="muted" style="font-size:13px">Complete the intro challenge to get the password — you only enter it once!</div>
      <div class="pwwrap" id="pwwrap">
        <div class="pwboxes" id="pwboxes">${'<div class="pwbox"></div>'.repeat(n)}</div>
        <input id="unlockInput" class="pwinput" type="text" inputmode="text" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" maxlength="${n}" aria-label="Password">
      </div>
      ${sv("Tryck här och skriv lösenordet. Stora och små bokstäver spelar ingen roll.")}
      <div id="unlockErr" class="danger" style="font-size:13px;margin-top:8px"></div>
      <button class="btn" id="unlockBtn" style="margin-top:14px">Unlock</button>
    </div>
    <div class="center" style="margin-top:14px"><button class="btn ghost small" id="updateBtn">↻ Update app</button></div>
   </div>`;
  const input=document.getElementById("unlockInput");
  const wrap=document.getElementById("pwwrap");
  const boxes=()=>document.querySelectorAll("#pwboxes .pwbox");
  const refreshBoxes=()=>{ const v=input.value; boxes().forEach((b,i)=>{ b.textContent=v[i]||""; b.classList.toggle("filled", i<v.length); }); };
  const submit=()=>{
    if(input.value.toLowerCase()===pw.toLowerCase()){ state.appUnlocked=true; save(); activeTab="home"; render(); }
    else {
      document.getElementById("unlockErr").textContent="Wrong password.";
      wrap.classList.add("bad"); setTimeout(()=>wrap.classList.remove("bad"),450);
      input.value=""; refreshBoxes(); input.focus();
    }
  };
  input.oninput=()=>{ document.getElementById("unlockErr").textContent=""; refreshBoxes(); if(input.value.length>=n) submit(); };
  input.onkeydown=e=>{ if(e.key==="Enter") submit(); };
  document.getElementById("unlockBtn").onclick=submit;
  document.getElementById("updateBtn").onclick=updateApp;
  input.focus();
}

function render(){
  if(!state.me){ renderSetup(); return; }

  applyPendingSync();
  document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("active", b.dataset.tab===activeTab));

  else if(activeTab==="badges") app.innerHTML=viewBadges();
  else if(activeTab==="sync") app.innerHTML=viewSync();

  wire();
}

/* =========================================================================
   SYNC CODES
   ========================================================================= */
function b64urlEncode(str){ return btoa(unescape(encodeURIComponent(str))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
function b64urlDecode(s){ s=s.replace(/-/g,'+').replace(/_/g,'/'); return decodeURIComponent(escape(atob(s))); }
function makeCode(){
  const m=state.me;
  const payload={v:2,id:m.id,nm:m.name,av:m.avatar,st:m.stars,lv:levelOf(m.stars),td:m.totalDone,bs:m.bestStreak,bc:m.badges.length,t:Date.now()};
  return "LDN-"+b64urlEncode(JSON.stringify(payload));
}
function readCode(code){
  try{
    code=(code||"").trim();
    if(code.toUpperCase().startsWith("LDN-")) code=code.slice(4);
    const obj=JSON.parse(b64urlDecode(code));
    if(obj.v!==2 || !obj.id || typeof obj.nm!=="string") return null;
    return obj;
  }catch(e){ return null; }
}
/* Apply a sync code that arrived via a scanned QR deep-link (?sync=…). */
function applyPendingSync(){
  if(!pendingSync || !state.me || !state.appUnlocked) return;
  const code=pendingSync; pendingSync=null;
  try{ history.replaceState(null,"",location.origin+location.pathname); }catch(e){}
  applySyncCode(code);
}
/* Set the partner from a sync code string. Returns true on success. */
function applySyncCode(code){
  const obj=readCode(code);
  if(!obj || obj.id===state.me.id) return false;
  state.partner={id:obj.id,nm:obj.nm,av:obj.av,st:obj.st,lv:obj.lv,td:obj.td,bs:obj.bs,bc:obj.bc,t:obj.t};
  save(); burstConfetti(); showToast("Synced with "+obj.nm); return true;
}
/* Pull a sync code out of a scanned string (could be a URL with ?sync=, or raw). */
function codeFromScan(s){
  s=(s||"").trim();
  const m=s.match(/[?&]sync=([^&\s]+)/);
  if(m){ try{ return decodeURIComponent(m[1]); }catch(e){ return m[1]; } }
  const m2=s.match(/LDN-[A-Za-z0-9\-_]+/);
  return m2 ? m2[0] : s;
}

/* ---------- In-app QR scanner (works inside the home-screen app) ---------- */
let scan={stream:null,raf:null,detector:null,active:false};
function loadJsQR(){
  return new Promise((res,rej)=>{
    if(window.jsQR) return res();
    const s=document.createElement("script");
    s.src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js";
    s.onload=()=>res(); s.onerror=()=>rej(new Error("load"));
    document.head.appendChild(s);
  });
}
async function startScan(){
  openModal(`
    <h3 style="margin:0 0 8px">Scan ${state.partner?esc(state.partner.nm):"your sibling"}'s QR</h3>
    <div class="scanbox"><video id="scanVideo" playsinline muted></video><div class="scanframe"></div></div>
    <div id="scanMsg" class="muted center" style="font-size:13px;margin-top:10px">Point the camera at their QR code…</div>
    <button class="btn ghost" id="scanCancel" style="margin-top:12px">Cancel</button>`);
  document.getElementById("scanCancel").onclick=()=>{ stopScan(); closeModal(); };
  const video=document.getElementById("scanVideo");
  const msg=document.getElementById("scanMsg");
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){ msg.innerHTML='<span class="danger">Camera not available — paste the code instead.</span>'; return; }
  try{
    scan.stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
    video.srcObject=scan.stream; video.setAttribute("playsinline","true"); await video.play();
  }catch(e){ msg.innerHTML='<span class="danger">Couldn\'t open the camera. Paste the code instead.</span>'; return; }
  if("BarcodeDetector" in window){ try{ scan.detector=new window.BarcodeDetector({formats:["qr_code"]}); }catch(e){ scan.detector=null; } }
  if(!scan.detector){ try{ await loadJsQR(); }catch(e){ msg.innerHTML='<span class="danger">Scanner needs internet. Paste the code instead.</span>'; return; } }
  scan.active=true;
  const canvas=document.createElement("canvas"), ctx=canvas.getContext("2d");
  const tick=async()=>{
    if(!scan.active) return;
    if(video.readyState===video.HAVE_ENOUGH_DATA && video.videoWidth){
      let raw=null;
      if(scan.detector){ try{ const codes=await scan.detector.detect(video); if(codes&&codes.length) raw=codes[0].rawValue; }catch(e){} }
      else if(window.jsQR){
        canvas.width=video.videoWidth; canvas.height=video.videoHeight;
        ctx.drawImage(video,0,0,canvas.width,canvas.height);
        const img=ctx.getImageData(0,0,canvas.width,canvas.height);
        const r=window.jsQR(img.data,img.width,img.height,{inversionAttempts:"dontInvert"}); if(r) raw=r.data;
      }
      if(raw){
        const obj=readCode(codeFromScan(raw));
        if(obj && obj.id!==state.me.id){ stopScan(); closeModal(); applySyncCode(codeFromScan(raw)); render(); return; }
        if(obj && obj.id===state.me.id) msg.textContent="That's your own QR — scan your sibling's.";
      }
    }
    scan.raf=requestAnimationFrame(tick);
  };
  scan.raf=requestAnimationFrame(tick);
}
function stopScan(){
  scan.active=false;
  if(scan.raf) cancelAnimationFrame(scan.raf);
  if(scan.stream){ try{ scan.stream.getTracks().forEach(t=>t.stop()); }catch(e){} }
  scan.stream=null; scan.raf=null; scan.detector=null;
}

/* Downscale + compress an image file to a JPEG data URL (~1280px, q0.7). */
function shrinkImage(file, cb){
  const reader=new FileReader();
  reader.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const max=1280; let w=img.width, h=img.height;
      if(w>h && w>max){ h=Math.round(h*max/w); w=max; }
      else if(h>=w && h>max){ w=Math.round(w*max/h); h=max; }
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      try{ cb(cv.toDataURL("image/jpeg",0.7)); }catch(e){ cb(null); }
    };
    img.onerror=()=>cb(null);
    img.src=reader.result;
  };
  reader.onerror=()=>cb(null);
  reader.readAsDataURL(file);
}

async function completeChallenge(id, photo){
  const m=state.me;
  const c=CHALLENGES.find(x=>x.id===id);
  if(!c || isDone(c) || isMaxed(c) || isDateLocked(c)) return;
  const today=todayStr();
  if(m.lastActive!==today){
    const y=new Date(); y.setDate(y.getDate()-1);
    const yStr=y.getFullYear()+"-"+String(y.getMonth()+1).padStart(2,"0")+"-"+String(y.getDate()).padStart(2,"0");
    m.streak=(m.lastActive===yStr)?m.streak+1:1;
    m.lastActive=today;
  }
  if(m.streak>m.bestStreak) m.bestStreak=m.streak;
  m.done[periodKey(c)]=true;
  m.stars+=c.stars; m.totalDone+=1;
  m.catCount[c.cat]=(m.catCount[c.cat]||0)+1;
  if(photo){
    if(!m.evidence) m.evidence=[];
    const ts=Date.now();
    const entry={cid:c.id, en:c.en, icon:c.icon, ts, st:c.stars, pk:periodKey(c)};
    if(HAS_IDB){
      const k=photoKey(ts);
      try{ await photoPut(k, photo); entry.key=k; }   // photo in IndexedDB, not localStorage
      catch(e){ entry.img=photo; }                    // fall back to inline if IDB fails
    } else { entry.img=photo; }
    m.evidence.unshift(entry);
    // No cap — keep every photo. (save() only drops oldest if storage is truly full.)
  }
  const before=m.badges.length;
  BADGES.forEach(b=>{ if(!m.badges.includes(b.id) && b.test(m)) m.badges.push(b.id); });
  save();
  burstConfetti(); beep();
  showToast(`+${c.stars} ⭐ Nice work!`+(m.badges.length>before?"\nNew badge unlocked!":""));
  render();
}

function showToast(msg){
  const t=document.getElementById("toast");
  t.innerHTML=esc(msg).replace(/\n/g,"<br>");
  t.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t=setTimeout(()=>t.classList.remove("show"),1900);
}
function burstConfetti(){
  const box=document.getElementById("confetti");
  const colors=["#3a64d8","#e0556a","#e8a13c","#36b07a","#9ab4f0"];
  for(let i=0;i<60;i++){
    const c=document.createElement("div"); c.className="conf";
    c.style.left=(Math.random()*100)+"vw"; c.style.top="-20px";
    c.style.background=colors[i%colors.length];
    box.appendChild(c);
    const dur=1200+Math.random()*1100, drift=(Math.random()-.5)*160;
    c.animate([{transform:"translate(0,0) rotate(0)",opacity:1},
      {transform:`translate(${drift}px,${window.innerHeight+60}px) rotate(${720+Math.random()*360}deg)`,opacity:1}],
      {duration:dur,easing:"cubic-bezier(.3,.6,.5,1)"});
    setTimeout(()=>c.remove(),dur);
  }
}
let audioCtx=null;
function beep(){
  if(!state.soundOn) return;
  try{
    audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    [523.25,659.25,783.99].forEach((f,i)=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type="triangle"; o.frequency.value=f; o.connect(g); g.connect(audioCtx.destination);
      const t=audioCtx.currentTime+i*0.09;
      g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.16,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+0.18);
      o.start(t); o.stop(t+0.2);
    });
  }catch(e){}
}

/* Save/share a proof photo as a JPEG (share sheet on phones, download on desktop). */
async function saveEvidence(i){
  const e=state.me.evidence[i]; if(!e) return;
  let data=null; try{ data=await evImg(e); }catch(_){}
  if(!data){ alert("Photo not found."); return; }
  try{
    const blob=await (await fetch(data)).blob();
    const fname="nord-"+((e.en||"photo").replace(/[^a-z0-9]+/gi,"-").slice(0,40).replace(/^-|-$/g,"")||"photo")+".jpg";
    const file=new File([blob],fname,{type:blob.type||"image/jpeg"});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file]}); return; }catch(err){ if(err && err.name==="AbortError") return; }
    }
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=fname;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1500);
    showToast("Photo saved");
  }catch(err){ alert("Could not save the photo."); }
}

  const impFile=document.getElementById("importFile");
  document.getElementById("importBtn").onclick=()=>impFile.click();
  impFile.onchange=()=>{ if(impFile.files[0]) importProgressFile(impFile.files[0]); };
  showStorageInfo();
}

/* Show how much device storage is used and whether it's protected from eviction. */
function showStorageInfo(){
  const el=document.getElementById("storageInfo"); if(!el) return;
  const photos=(state.me&&state.me.evidence?state.me.evidence.length:0);
  const parts=[photos+" photo"+(photos===1?"":"s")+" stored"];
  const done=()=>{ el.textContent=parts.join(" · "); };
  try{
    const tasks=[];
    if(navigator.storage&&navigator.storage.estimate){
      tasks.push(navigator.storage.estimate().then(({usage})=>{ if(usage!=null) parts.push("~"+(usage/1048576).toFixed(1)+" MB used"); }));
    }
    if(navigator.storage&&navigator.storage.persisted){
      tasks.push(navigator.storage.persisted().then(p=>parts.push(p?"protected":"not protected — back up regularly")));
    }
    if(tasks.length) Promise.all(tasks).then(done).catch(done); else done();
  }catch(e){ done(); }
}

/* Full backup: a self-contained file with progress AND photos (photos are read
   back out of IndexedDB and inlined so the file works on any device). */
async function exportProgress(){
  try{
    showToast("Preparing backup…");
    const copy=JSON.parse(JSON.stringify(state));
    if(copy.me && Array.isArray(copy.me.evidence)){
      for(const e of copy.me.evidence){
        if(!e.img && e.key){ try{ e.img=await photoGet(e.key); }catch(_){} }
        delete e.key; // backup carries inline images
      }
    }
    const json=JSON.stringify(copy);
    const who=(state.me&&state.me.name?state.me.name:"backup").replace(/[^a-z0-9]/gi,"-");
    const fname="nord-challenges-"+who+".json";
    // Prefer the OS share sheet so the file can go straight to the other phone
    // via AirDrop (iOS), Nearby Share / Quick Share (Android), Bluetooth, etc.
    try{
      const file=new File([json],fname,{type:"application/json"});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        await navigator.share({files:[file], title:"Nord Challenges backup"});
        showToast("Backup shared"); return;
      }
    }catch(e){ if(e && e.name==="AbortError") return; }
    // Fallback: download the file
    const url=URL.createObjectURL(new Blob([json],{type:"application/json"}));
    const a=document.createElement("a");
    a.href=url; a.download=fname;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1500);
    showToast("Backup saved");
  }catch(e){ alert("Could not create the backup file."); }
}
/* Restore a full backup on another device. Replaces everything on this phone. */
function importProgressFile(file){
  const r=new FileReader();
  r.onload=async()=>{
    try{
      const s=JSON.parse(r.result);
      if(!s || !s.me || typeof s.me.stars!=="number") throw new Error("bad");
      state=Object.assign(defaultState(), s);
      const shape={ stars:0, totalDone:0, catCount:{}, done:{}, streak:0, bestStreak:0, lastActive:null, badges:[], evidence:[] };
      state.me=Object.assign(shape, s.me);
      if(!state.me.id) state.me.id=newId();
      // move inlined photos from the backup into IndexedDB on this device
      if(HAS_IDB && Array.isArray(state.me.evidence)){
        for(const e of state.me.evidence){
          if(e.img){ const k=photoKey(e.ts||Date.now()); try{ await photoPut(k, e.img); e.key=k; delete e.img; }catch(_){} }
        }
      }
      parentUnlocked=true; parentScreen="dash"; save(); showToast("Progress restored"); render();
    }catch(e){ alert("That file could not be read as a Nord Challenges backup."); }
  };
  r.onerror=()=>alert("Could not read that file.");
  r.readAsText(file);
}

function evDate(ts, full){
  const d=new Date(ts);
  const base=d.getDate()+" "+MONTHS[d.getMonth()];
  if(!full) return base;
  return base+" "+d.getFullYear()+", "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}
/* Parent rejects a completion: refund points, free the slot, drop the photo,
   and re-evaluate badges. The challenge becomes available to do again. */
function undoEvidence(i){
  const m=state.me, e=m.evidence[i];
  if(!e){ parentGo("gallery"); return; }
  const c=CHALLENGES.find(x=>x.id===e.cid);
  // reconstruct the completion key if older entries didn't store it
  let pk=e.pk;
  if(!pk && c){
    const d=new Date(e.ts);
    const ds=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    if(c.type==="daily") pk=c.id+"|"+ds; else if(c.type==="once") pk=c.id+"|once";
  }
  if(pk && m.done[pk]) delete m.done[pk];
  const refund = e.st!=null ? e.st : (c?c.stars:0);
  m.stars=Math.max(0, m.stars-refund);
  m.totalDone=Math.max(0, m.totalDone-1);
  if(c) m.catCount[c.cat]=Math.max(0,(m.catCount[c.cat]||0)-1);
  if(e.key) photoDel(e.key);
  m.evidence.splice(i,1);
  // drop any badges that are no longer earned
  m.badges=m.badges.filter(id=>{ const b=BADGES.find(x=>x.id===id); return b?b.test(m):false; });
  save(); showToast("Activity undone — "+refund+" stars removed"); parentGo("gallery");
}

/* =========================================================================
   WIRE EVENTS
   ========================================================================= */
function wireQuestButtons(){
  document.querySelectorAll("[data-help]").forEach(b=>b.onclick=()=>{ const x=document.getElementById("sv-"+b.dataset.help); if(x) x.classList.toggle("show"); });
  document.querySelectorAll("[data-complete]").forEach(b=>b.onclick=()=>requestComplete(b.dataset.complete));
}
function wireBadges(){
  document.querySelectorAll("[data-badge]").forEach(el=>{
    const b=BADGES[parseInt(el.dataset.badge,10)]; if(!b) return;
    let timer=null;
    const show=ev=>{ ev.preventDefault(); timer=setTimeout(()=>showToast((b.svNm||b.nm)+": "+(b.svDs||b.ds)),300); };
    const cancel=()=>{ if(timer){ clearTimeout(timer); timer=null; } };
    el.addEventListener("touchstart", show, {passive:false});
    el.addEventListener("touchend", cancel);
    el.addEventListener("touchmove", cancel);
    el.addEventListener("mousedown", show);
    el.addEventListener("mouseup", cancel);
    el.addEventListener("mouseleave", cancel);
  });
}
function wire(){
  const tu=document.getElementById("toUpdate"); if(tu) tu.onclick=updateApp;
  const ts=document.getElementById("toSync"); if(ts) ts.onclick=()=>{ activeTab="sync"; scrollTop(); render(); };
  const gq=document.getElementById("goQuests"); if(gq) gq.onclick=()=>{ activeTab="challenges"; scrollTop(); render(); };
  // category switch updates only the list (keeps your scroll position)
  document.querySelectorAll("[data-cat]").forEach(b=>b.onclick=()=>{
    activeCat=b.dataset.cat;
    document.querySelectorAll("[data-cat]").forEach(x=>x.classList.toggle("active", x.dataset.cat===activeCat));
    const ql=document.getElementById("qlist"); if(ql){ ql.innerHTML=questListHTML(); wireQuestButtons(); }
  });
  wireQuestButtons();
  wireBadges();
  document.querySelectorAll("[data-myev]").forEach(d=>d.onclick=()=>openMyEvidence(parseInt(d.dataset.myev,10)));
  const omg=document.getElementById("openMyGallery"); if(omg) omg.onclick=()=>{ myGalleryOpen=true; scrollTop(); render(); };
  const mgb=document.getElementById("myGalBack"); if(mgb) mgb.onclick=()=>{ myGalleryOpen=false; scrollTop(); render(); };
  hydrateImgs();
  if(activeTab==="parent") wireParent();

  // sync tab
  const sb=document.getElementById("scanBtn"); if(sb) sb.onclick=startScan;
}

document.querySelectorAll(".nav button").forEach(b=>b.onclick=()=>{
  if(!state.me || !state.appUnlocked) return;
  activeTab=b.dataset.tab; activeCat="all"; myGalleryOpen=false;
  if(activeTab==="parent"){ parentUnlocked=false; parentScreen="dash"; }  // require password each visit
  scrollTop(); render();
});
document.getElementById("overlay").addEventListener("click",e=>{ if(e.target.id==="overlay") closeModal(); });

requestPersist();   // ask the browser to keep our data (resists eviction)
migratePhotos();    // move any old inline photos out of localStorage into IndexedDB
render();
</script>
